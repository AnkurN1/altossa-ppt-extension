<!DOCTYPE html>
<html>
  <head>
    <title>Add to PPT</title>
    <style>
      body { font-family: sans-serif; padding: 10px; width: 220px; background-color: #f9f9f9; }
      button {
        padding: 10px;
        width: 100%;
        font-size: 16px;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 5px;
        margin-bottom: 10px;
        cursor: pointer;
      }
      button#reset { background-color: #d9534f; }
    </style>
  </head>
  <body>
    <h3> Add Images to PPT</h3>
    <button id="download">Download PPT</button>
    <button id="reset">Clear Selection</button>
    <script src="popup.js"></script>
  </body>
</html>
